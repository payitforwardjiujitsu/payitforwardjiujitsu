  <script>
    // ===== ハンバーガー =====
    var ham = document.getElementById('hamburger');
    var menu = document.getElementById('mobileMenu');
    ham.addEventListener('click', function() {
      ham.classList.toggle('open');
      menu.classList.toggle('open');
      document.body.classList.toggle('menu-open');
    });
    menu.querySelectorAll('a').forEach(function(a) {
      a.addEventListener('click', function() {
        ham.classList.remove('open');
        menu.classList.remove('open');
        document.body.classList.remove('menu-open');
      });
    });

    // ===== お知らせデータ =====
    const NEWS_DATA = [
  {
    "id": 1,
    "title": "Pay it Forward Jiu-Jitsu オープン決定",
    "date": "2026-05-07",
    "content": "この度、東京・信濃町にて「Pay it Forward Jiu-Jitsu」のオープンが正式に決定いたしました。\n\nはじめての方も、女性も、キッズも、50代以上の方も。それぞれのペースで楽しく強くなれる場所を目指します。\n\nオープン日・体験会の詳細については順次お知らせいたします。\nぜひInstagramやLINEでの最新情報をお見逃しなく。"
  },
  {
    "id": 2,
    "title": "オープン準備スタート",
    "date": "2026-05-17",
    "content": "本日よりオープンに向けた準備を本格的にスタートしました。\n\n道場の整備、スケジュール調整、体験会の企画など、鋭意準備中です。\n\n無料体験のお申し込みは「お問い合わせ」ページよりお気軽にどうぞ。\nオープンまで今しばらくお待ちください。"
  },
  {
    "id": 3,
    "title": "ジムの近くの歩道橋からの眺め",
    "date": "2026-05-19",
    "thumbnail": "news01.jpg",
    "content": "ジムの近くの有名な歩道橋です！\n\nジムの準備の最中にお散歩。\n\n良いジムを作って皆さんをお待ちしております。"
  },
  {
    "id": 4,
    "title": "プレオープン＆グランドオープンのお知らせ",
    "date": "2026-06-22",
    "thumbnail": "news02.jpg",
    "content": "7月28日（火）〜31日（金） プレオープン\n8月1日（土） グランドオープン\n\nいよいよ、Pay it Forward JIU-JITSUがオープンします！\n\n7月28日（火）から31日（金）までの4日間は「プレオープン期間」として、体験レッスンや見学を随時受け付けております。\n\nそして8月1日（土）はいよいよグランドオープン！当日はお披露目会として、体験レッスン・施設見学・インストラクターとの交流など、楽しいイベントを予定しています。\n\n「ちょっと気になっていた」「柔術をやってみたかった」という方、ぜひこの機会に遊びにいらしてください！\n\n皆さんとマットの上でお会いできることを楽しみにしております。\n\n— New Challenge, Stronger Together. —"
  }
];

    // ===== 詳細表示 =====
    function formatDate(s) {
      var d = new Date(s);
      return d.getFullYear() + '.' + String(d.getMonth()+1).padStart(2,'0') + '.' + String(d.getDate()).padStart(2,'0');
    }

    var params = new URLSearchParams(window.location.search);
    var targetId = parseInt(params.get('id'));
    var item = null;
    for (var i = 0; i < NEWS_DATA.length; i++) {
      if (NEWS_DATA[i].id === targetId) { item = NEWS_DATA[i]; break; }
    }

    var container = document.getElementById('detailContainer');
    if (!item) {
      container.innerHTML = '<p class="detail-loading">記事が見つかりませんでした。</p>';
    } else {
      document.title = item.title + ' | Pay it Forward Jiu-Jitsu';
      var body = item.content.replace(/\n/g, '<br>');
      var imgHtml = item.thumbnail ? '<img src="' + item.thumbnail + '" alt="' + item.title + '" class="detail-img" loading="lazy">' : '';
      container.innerHTML =
        '<p class="detail-eyebrow">お知らせ</p>' +
        '<p class="detail-date">' + formatDate(item.date) + '</p>' +
        '<h1 class="detail-title">' + item.title + '</h1>' +
        imgHtml +
        '<div class="detail-body">' + body + '</div>' +
        '<a href="news.html" class="detail-back">' +
        '<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M11 7H3M6 3L2 7l4 4" stroke="#1a1a1a" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>' +
        'お知らせ一覧へ戻る</a>';
    }
  </script>
