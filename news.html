    .news-section {

      padding-bottom: 12px;
      border-bottom: 1px solid var(--black);
    }

    .news-list {
      list-style: none;
    }

    .news-item a {
      display: grid;
      grid-template-columns: 100px 1fr;
      gap: 24px;
      align-items: center;
      padding: 20px 0;
      border-bottom: 1px solid var(--gray-mid);
      transition: opacity 0.2s;
    }

    .news-item a:hover { opacity: 0.55; }

    .news-date {
      font-size: 12px;
      color: var(--gray-text);
      letter-spacing: 0.08em;
      white-space: nowrap;
    }

    .news-title {

      font-weight: 500;
      letter-spacing: 0.04em;
      color: var(--black);
    }

    .news-arrow {
      display: flex;
      align-items: center;
      justify-content: flex-end;
    }

    /* ローディング・エラー */
    .news-loading {
      text-align: center;
      padding: 64px 0;
      font-size: 13px;
      color: var(--gray-text);
    }

    @media (max-width: 768px) {
      .news-section { padding: 40px 20px; }

      .news-item a {
        grid-template-columns: 1fr;
        gap: 6px;
        padding: 18px 0;

  <script>
    // ===== ハンバーガー =====
    var ham = document.getElementById('hamburger');
    var menu = document.getElementById('mobileMenu');
    ham.addEventListener('click', function() {
      ham.classList.toggle('open');
      menu.classList.toggle('open');
      document.body.classList.toggle('menu-open');
    });
    menu.querySelectorAll('a').forEach(function(a) {
      a.addEventListener('click', function() {
        ham.classList.remove('open');
        menu.classList.remove('open');
        document.body.classList.remove('menu-open');
      });
    });

    // ===== お知らせデータ =====
    const NEWS_DATA = [
  {
    "id": 1,
    "title": "Pay it Forward Jiu-Jitsu オープン決定",
    "date": "2026-05-07",

  },
  {
    "id": 2,
    "title": "オープン準備スタート",
    "date": "2026-05-17",
    "content": "本日よりオープンに向けた準備を本格的にスタートしました。\n\n道場の整備、スケジュール調整、体験会の企画など、鋭意準備中です。\n\n無料体験のお申し込みは「お問い合わせ」ページよりお気軽にどうぞ。\nオープンまで今しばらくお待ちください。"
  },
  {
    "id": 3,
    "title": "ジムの近くの歩道橋からの眺め",
    "date": "2026-05-19",
    "thumbnail": "news01.jpg",
    "content": "ジムの近くの有名な歩道橋です！\n\nジムの準備の最中にお散歩。\n\n良いジムを作って皆さんをお待ちしております。"
  },
  {
    "id": 4,
    "title": "プレオープン＆グランドオープンのお知らせ",
    "date": "2026-06-22",
    "thumbnail": "news02.jpg",
    "content": "7月28日（火）〜31日（金） プレオープン\n8月1日（土） グランドオープン\n\nいよいよ、Pay it Forward JIU-JITSUがオープンします！\n\n7月28日（火）から31日（金）までの4日間は「プレオープン期間」として、体験レッスンや見学を随時受け付けております。\n\nそして8月1日（土）はいよいよグランドオープン！当日はお披露目会として、体験レッスン・施設見学・インストラクターとの交流など、楽しいイベントを予定しています。\n\n「ちょっと気になっていた」「柔術をやってみたかった」という方、ぜひこの機会に遊びにいらしてください！\n\n皆さんとマットの上でお会いできることを楽しみにしております。\n\n— New Challenge, Stronger Together. —"
  }
];

    // ===== 一覧表示 =====
    function formatDate(s) {
      var d = new Date(s);
      return d.getFullYear() + '.' + String(d.getMonth()+1).padStart(2,'0') + '.' + String(d.getDate()).padStart(2,'0');
    }
    function getMonthKey(s) {
      var d = new Date(s);
      return d.getFullYear() + '年' + (d.getMonth()+1) + '月';
    }

    var data = NEWS_DATA.slice().sort(function(a,b){ return new Date(b.date) - new Date(a.date); });
    var groups = {};
    var order = [];
    data.forEach(function(item) {
      var key = getMonthKey(item.date);
      if (!groups[key]) { groups[key] = []; order.push(key); }
      groups[key].push(item);
    });

    var container = document.getElementById('newsContainer');
    container.innerHTML = '';
    order.forEach(function(month) {
      var sec = document.createElement('div');
      sec.className = 'news-month';
      var h3 = document.createElement('h3');
      h3.className = 'news-month-heading';
      h3.textContent = month;
      sec.appendChild(h3);
      var ul = document.createElement('ul');
      ul.className = 'news-list';
      groups[month].forEach(function(item) {
        var li = document.createElement('li');
        li.className = 'news-item';
        li.innerHTML = '<a href="news-detail.html?id=' + item.id + '"><span class="news-date">' + formatDate(item.date) + '</span><span class="news-title">' + item.title + '</span></a>';
        ul.appendChild(li);
      });
      sec.appendChild(ul);
      container.appendChild(sec);
    });
  </script>
